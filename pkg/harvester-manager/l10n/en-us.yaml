harvesterManager:
  manage: Manage
  tableHeaders:
    kubernetesVersion: Kubernetes Version
    harvesterVersion: Infinitystack Version
  cluster:
    label: Infinitystack Clusters
    none: There are no Infinitystack Clusters
    learnMore: Learn more about Infinitystack from the <a target="_blank" href="https://harvesterhci.io/" rel="noopener noreferrer nofollow">Infinitystack Web Site</a> or read the <a target="_blank" href="https://docs.harvesterhci.io/" rel="noopener noreferrer nofollow">Infinitystack Docs</a>
    description: Infinitystack is a modern Hyperconverged infrastructure (HCI) solution built for bare metal servers using enterprise-grade open source technologies including Kubernetes, Kubevirt and Longhorn.
    supportMessage: The Infinitystack UI Extension only supports Infinitystack v1.3.0 and later versions
  plugins:
    loadError: Error loading Infinitystack plugin
  extension:
    install:
      warning: "The Infinitystack UI Extension is not installed"
      prompt: "UI Integration for Infinitystack is now provided via the new Infinitystack UI Extension, which needs to be installed."
      prompt-standard-user: Please contact your system administrator
      steps:
        repo:
          1: Go to the
          2: Apps Repositories
          3: page and add the <a target="_blank" href="https://github.com/harvester/harvester-ui-extension" rel="noopener noreferrer nofollow">Infinitystack repository</a>
        ui:
          1: Go to the
          2: Extensions
          3: page and install the Infinitystack Extension
    update:
      warning: "Your current Infinitystack UI Extension ({currentVersion}) is not the latest."
      prompt: "A new version ({ newVersion }) is available, please click on Update button to install the latest Infinitystack UI Extension"
      prompt-standard-user: Please contact your system administrator to install the latest version
    missingRepo:
      warning: "The Infinitystack UI Extension repository is missing"
      prompt: "Please click on Update button to add the Infinitystack repository and install the latest Infinitystack UI Extension"
      prompt-standard-user: Please contact your system administrator to install the latest Infinitystack UI Extension
    missingVersion:
      warning: "Could not find a compatible version"
      prompt: "Please update Barastack to get the latest compatible version of the Infinitystack UI extension or try to install it manually"
      prompt-standard-user: Please contact your system administrator
    error:
      warning: "Warning, Infinitystack UI extension automatic installation failed"
      prompt: "Please refresh the page and try again or install the Infinitystack UI extension manually"
      prompt-standard-user: Please contact your system administrator to install or update the Infinitystack extension
  rke:
    templateError: Incorrect template format
  affinity:
    thisPodNamespace: This VM's namespace
    matchExpressions:
      inNamespaces: "Workloads in these namespaces"
    vmAffinityTitle: VM Scheduling
    namespaces:
      placeholder: e.g. default,system,base
      label: Namespaces
    addLabel: Add Workload Selector
    topologyKey:
      placeholder: 'topology.kubernetes.io/zone'
  vGpu:
    title: VGPUs
    label: VGPU type
    placeholder: 'Please select a VGPU'
    allocatable: allocatable
    allocatableUnknown: missing allocation info
